{% extends "base.html" %}

{% block content %}

<h2>Your Orders</h2>

{% if orders %}

<table class="table">

<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
</tr>
</thead>

<tbody>

{% for order in orders %}

<tr>

<td>{{ order.product_name }}</td>

<td>₹{{ order.price }}</td>

<td>{{ order.quantity }}</td>

<td>₹{{ order.total_price }}</td>

</tr>

{% endfor %}

</tbody>

</table>

{% else %}

<p>No orders yet.</p>

{% endif %}

{% endblock %}
