{% extends "base.html" %}

{% block content %}

<h2>Our Products</h2>

<div class="row">

{% for product in products %}

<div class="col-md-4">
<div class="card mb-4">
<div class="card-body">

<h5 class="card-title">{{ product.name }}</h5>

<p class="card-text">Price: ₹{{ product.price }}</p>

<a href="/add_to_cart/{{ product.id }}" class="btn btn-primary">Add to Cart</a>

</div>
</div>
</div>

{% endfor %}

</div>

{% endblock %}
